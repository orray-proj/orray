paths:
  /v1alpha1/canvases:
    get:
      description: List all the canvases the user has access to
      operationId: ListCanvasesV1alpha1
      parameters:
      - description: Limit is the maximum number of items to return.
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Offset is the number of items to skip.
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ListResponse-Canvas'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List all canvases
      tags:
      - Canvas
    post:
      consumes:
      - application/json
      description: Create a new canvas with the given display name
      operationId: CreateCanvasV1alpha1
      parameters:
      - description: Canvas data
        in: body
        name: canvas
        required: true
        schema:
          $ref: '#/definitions/CreateCanvasRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Canvas'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Create a new canvas
      tags:
      - Canvas
