{{- if and .Values.apiserver.enabled .Values.rbac.installClusterRoles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: orray-apiserver
  labels:
    {{- include "orray.labels" . | nindent 4 }}
    {{- include "orray.apiserver.labels" . | nindent 4 }}
rules:
- apiGroups:
  - orray.dev
  resources:
  - canvas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
{{- end }}
