<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'sha256-CBxqRPCGGbsazqrGYQAJmezQ9i1ftnH9Ocwj0JpLo4Q='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self'"
    >
    <title>Orray</title>
    <!-- If you change this script, recompute the sha256 hash in the CSP meta tag above. -->
    <script>
    "use strict";
    const t = localStorage.getItem("orray-theme");
    if (
      t === "dark" ||
      (t !== "light" && matchMedia("(prefers-color-scheme:dark)").matches)
    ) {
      document.documentElement.classList.add("dark");
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
