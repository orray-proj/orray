apiVersion: apps/v1
kind: Deployment
metadata:
  name: orray-ui
  namespace: orray
  labels:
    app.kubernetes.io/component: ui
    app.kubernetes.io/instance: orray
    app.kubernetes.io/name: orray
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/component: ui
      app.kubernetes.io/instance: orray
      app.kubernetes.io/name: orray
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ui
        app.kubernetes.io/instance: orray
        app.kubernetes.io/name: orray
    spec:
      containers:
      - name: ui
        image: orray-ui:placeholder
        imagePullPolicy: Always
        env:
        - name: API_URL
          value: http://orray-api
        ports:
        - name: http
          containerPort: 3333
          protocol: TCP
